<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>Promemoria To Do List +</h1>
    </header>
    <main>
      <form id="form">
        <label for="promemoria">

          <input id="promemoria" type="text" required placeholder="To do" />

        <button id="button-summit">Aggiungi</button>
      </form>
      <div id="lista-contenitore"></div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
